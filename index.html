<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="images/favicon-32x32.png">
    <link rel="stylesheet" href="style.css">
    <title>QR Code</title>
</head>
<body>
    <section class="center-horizontal-vertical">
        <figure>
            <img src="images/image-qr-code.png" alt="image of a QR code leading to the Frontend Mentor website">
            <figcaption>
                <p class="title-text">Improve your front-end skills by building projects</p>
                <p class="subtitle-text">Scan the QR code to visit Frontend Mentor and take your coding skills to the next  level</p>
            </figcaption>
        </figure>
    </section>
</body>
</html>
